<!DOCTYPE html>
<html>
<head>
	<title>JS Onboard Project</title>
	<script type="text/javascript" charset="utf-8" src="third_party/jquery-2.0.3.min.js"></script>
	<script src="app.js"></script>
	<style>
	  * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f5f7fa;
    }
    #grid-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 20px;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    table {
        flex: 1;
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }
    thead th {
        background: #2c3e50;
        color: white;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 12px 8px;
        border: 1px solid #34495e;
        text-align: left;
        position: sticky;
        top: 0;
    }
    tbody td {
        padding: 10px 8px;
        border: 1px solid #e0e4e8;
        background: white;
    }
    tbody tr:nth-child(even) td {
        background: #f8f9fa;
    }
    tbody tr:hover td {
        background: #e9ecef;
    }
    #pagination {
        margin-top: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        padding: 10px 0;
    }
    #pagination button {
        background: #3498db;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
    }
    #pagination button:hover:not(:disabled) {
        background: #2980b9;
    }
    #pagination button:disabled {
        background: #bdc3c7;
        cursor: not-allowed;
    }
    #page-info {
        font-size: 16px;
        font-weight: 500;
        color: #2c3e50;
    }
        #loading {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1;
        font-size: 18px;
        color: #7f8c8d;
    }
  </style>
</head>
<body>
    <div id="grid-container">
        <div id="loading">Loading data…</div>
        <table id="data-table">
            <thead id="table-head">
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>
        <div id="pagination">
            <button id="prev-btn">Previous</button>
            <span id="page-info">Page 0 of 0</span>
            <button id="next-btn">Next</button>
        </div>
    </div>
</body>
</html>
